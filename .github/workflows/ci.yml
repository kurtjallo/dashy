name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    # Placeholder env so apps/api/src/config/env.ts (zod, parsed at import) validates.
    # The suite is pure unit tests — no DB/Redis connection is opened — so these are
    # never dialed; they only need to satisfy the schema (URL shape, 32-char secrets).
    env:
      DATABASE_URL: postgres://dashy:dashy@localhost:5432/dashy_test
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: ci-placeholder-session-secret-0000000000
      ENCRYPTION_KEY: ci-placeholder-encryption-key-00000000000
      GITHUB_OAUTH_CLIENT_ID: ci-placeholder-client-id
      GITHUB_OAUTH_CLIENT_SECRET: ci-placeholder-client-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  docker:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t dashy-api:ci .
      - name: Smoke test image
        run: |
          docker run -d --name smoke -e PORT=4000 dashy-api:ci || true
          # Full smoke test requires postgres/redis; structural build success is the gate here.
          docker image inspect dashy-api:ci > /dev/null
